name: Bug Ticket
description: Create a bug ticket with reproducible context and embedded Gherkin checklist acceptance criteria.
title: "[Bug] "
labels:
  - "type:bug"
  - "triage"
body:
  - type: textarea
    id: story_problem
    attributes:
      label: Story / Problem
      description: Describe user impact and why this is a bug.
      placeholder: |
        User impact:
        Why this behavior is incorrect:
    validations:
      required: true

  - type: textarea
    id: jtbd
    attributes:
      label: JTBD
      description: State the primary job blocked by this bug. Use `When ..., I want to ..., so I can ...`.
      placeholder: |
        When ...
        I want to ...
        so I can ...
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Step 1
        2. Step 2
        3. Step 3
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      placeholder: Describe expected behavior.
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      placeholder: Describe observed behavior.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: List what the fix should include.
      placeholder: |
        - In-scope item 1
        - In-scope item 2
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria (Gherkin Checklist)
      description: Add testable checklist items using Given/When/Then.
      placeholder: |
        - [ ] Given ..., when ..., then ...
        - [ ] Given ..., when ..., then ...
        - [ ] Given ..., when ..., then ...
    validations:
      required: true

  - type: input
    id: assignee
    attributes:
      label: Assignee
      placeholder: Username or team
    validations:
      required: true

  - type: input
    id: reporter
    attributes:
      label: Reporter
      placeholder: Usually issue creator
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: input
    id: labels
    attributes:
      label: Additional Labels
      description: Add labels beyond defaults, comma-separated.
      placeholder: "component:backend, area:auth"
    validations:
      required: true

  - type: input
    id: component
    attributes:
      label: Component
      placeholder: auth-service
    validations:
      required: true

  - type: input
    id: epic_initiative
    attributes:
      label: Epic / Initiative
      placeholder: Reliability Q2
    validations:
      required: true

  - type: input
    id: estimate
    attributes:
      label: Estimate
      placeholder: 3 points
    validations:
      required: true

  - type: input
    id: due_date
    attributes:
      label: Due Date
      description: Use YYYY-MM-DD.
      placeholder: "2026-03-15"
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      placeholder: |
        - [ ] Root cause analysis
        - [ ] Fix implementation
        - [ ] Regression tests
    validations:
      required: true

  - type: textarea
    id: related_links
    attributes:
      label: Links / Dependencies
      placeholder: |
        - Error logs:
        - Related docs:
        - Related tickets:
        - Blocked by:
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
      placeholder: |
        - Exclusion 1
    validations:
      required: true
