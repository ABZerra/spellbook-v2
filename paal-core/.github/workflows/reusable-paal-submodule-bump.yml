name: Reusable PAAL Submodule Bump

on:
  workflow_call:
    inputs:
      submodule_path:
        description: Path to the PAAL git submodule in the caller repository
        required: false
        default: paal-core
        type: string
      base_branch:
        description: Base branch where the bump PR should target
        required: false
        default: main
        type: string
      update_channel:
        description: Update strategy. Use latest-tag or provide an explicit ref.
        required: false
        default: latest-tag
        type: string
      paal_remote:
        description: PAAL git remote URL
        required: false
        default: https://github.com/ABZerra/PAAL.git
        type: string

jobs:
  bump-submodule:
    name: Bump PAAL submodule pointer
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Bump submodule ref
        id: bump
        env:
          SUBMODULE_PATH: ${{ inputs.submodule_path }}
          UPDATE_CHANNEL: ${{ inputs.update_channel }}
          PAAL_REMOTE: ${{ inputs.paal_remote }}
        run: |
          set -euo pipefail

          if [ ! -f .gitmodules ]; then
            echo "Missing .gitmodules in caller repository." >&2
            exit 1
          fi

          if ! git config -f .gitmodules --get-regexp "^submodule\..*\.path$" | awk '{print $2}' | grep -Fxq "$SUBMODULE_PATH"; then
            echo "Submodule path '$SUBMODULE_PATH' is not declared in .gitmodules." >&2
            exit 1
          fi

          CURRENT_SHA="$(git ls-tree HEAD "$SUBMODULE_PATH" | awk '{print $3}')"
          if [ -z "$CURRENT_SHA" ]; then
            echo "Could not determine current submodule SHA for '$SUBMODULE_PATH'." >&2
            exit 1
          fi

          git submodule update --init -- "$SUBMODULE_PATH"
          git -C "$SUBMODULE_PATH" remote set-url origin "$PAAL_REMOTE"
          git -C "$SUBMODULE_PATH" fetch --tags --force origin

          case "$UPDATE_CHANNEL" in
            latest-tag)
              TARGET_REF="$(git -C "$SUBMODULE_PATH" tag --sort=-version:refname | head -n 1)"
              if [ -z "$TARGET_REF" ]; then
                TARGET_REF="origin/HEAD"
              fi
              ;;
            *)
              TARGET_REF="$UPDATE_CHANNEL"
              ;;
          esac

          git -C "$SUBMODULE_PATH" checkout --detach "$TARGET_REF"
          TARGET_SHA="$(git -C "$SUBMODULE_PATH" rev-parse HEAD)"
          TARGET_SHA_SHORT="$(printf '%.12s' "$TARGET_SHA")"

          TARGET_DISPLAY="$TARGET_REF"
          if [ "$TARGET_REF" = "origin/HEAD" ]; then
            TARGET_DISPLAY="$TARGET_SHA_SHORT"
          fi

          TARGET_SLUG="$(printf '%s' "$TARGET_DISPLAY" | tr '/:' '-' | tr -cd 'A-Za-z0-9._-')"
          if [ -z "$TARGET_SLUG" ]; then
            TARGET_SLUG="$TARGET_SHA_SHORT"
          fi

          SUBMODULE_SLUG="$(printf '%s' "$SUBMODULE_PATH" | tr '/:' '-' | tr -cd 'A-Za-z0-9._-')"
          if [ -z "$SUBMODULE_SLUG" ]; then
            SUBMODULE_SLUG="paal-core"
          fi

          git add "$SUBMODULE_PATH"

          if [ "$CURRENT_SHA" = "$TARGET_SHA" ]; then
            echo "No submodule update needed. Current SHA already matches target SHA."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Submodule update detected: $CURRENT_SHA -> $TARGET_SHA"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

          echo "current_sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          echo "target_sha_short=$TARGET_SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "target_display=$TARGET_DISPLAY" >> "$GITHUB_OUTPUT"
          echo "target_slug=$TARGET_SLUG" >> "$GITHUB_OUTPUT"
          echo "submodule_slug=$SUBMODULE_SLUG" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.bump.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/update-${{ steps.bump.outputs.submodule_slug }}-${{ steps.bump.outputs.target_slug }}
          base: ${{ inputs.base_branch }}
          delete-branch: true
          commit-message: "chore: bump ${{ inputs.submodule_path }} to ${{ steps.bump.outputs.target_sha_short }}"
          title: "chore: update ${{ inputs.submodule_path }} to ${{ steps.bump.outputs.target_display }}"
          body: |
            Automated submodule bump generated by reusable PAAL workflow.

            - Submodule path: `${{ inputs.submodule_path }}`
            - Previous SHA: `${{ steps.bump.outputs.current_sha }}`
            - Target SHA: `${{ steps.bump.outputs.target_sha }}`
            - Update channel: `${{ inputs.update_channel }}`
            - PAAL remote: `${{ inputs.paal_remote }}`

      - name: No-op notice
        if: steps.bump.outputs.changed == 'false'
        run: echo "No diff found for '${{ inputs.submodule_path }}'; skipping PR creation."
